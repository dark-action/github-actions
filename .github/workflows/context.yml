name: context
on: workflow_dispatch

jobs:
  context-job:
    runs-on: ubuntu-latest
    steps:
      - name : github context
        run: |
          echo "toJson(github)" ${{ toJSON(github) }}
      - name: check github context
        run: |
          echo "github.event_name" ${{ github.event_name }}
          echo "github.repository" ${{ github.repository }}
