name: workflow-dispatch
on:
  workflow_dispatch:  # ← 여기서 하이픈(-)이 아니라 언더바(_)
    inputs:
        name:
            description: 'set name'
            required: true
            default: 'github-actions'
            type: string
        environment:
            description: 'set env'
            required: true
            default: 'dev'
            type: choice
            options:
              - dev
              - qa
              - prod
jobs:
    workflow-dispatch-job:
        runs-on: ubuntu-latest
        steps:
            - name: step1
              run: echo "This is step 1 of the workflow dispatch"
            - name: step2
              run: |
                echo "hello world"
                echo "github action"
            - name: step3
              run: |
                echo "name is ${{ inputs.name }}"
                echo "environment is ${{ inputs.environment }}"